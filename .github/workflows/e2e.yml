name: E2E

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  api-e2e:
    name: API integration + web E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kepler
          POSTGRES_PASSWORD: kepler
          POSTGRES_DB: kepler
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kepler -d kepler"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://kepler:kepler@localhost:5432/kepler
      DATABASE_URL_SYNC: postgresql+psycopg2://kepler:kepler@localhost:5432/kepler
      REDIS_URL: redis://localhost:6379/0
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install API
        working-directory: services/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run API migrations
        working-directory: services/api
        run: alembic upgrade head
      - name: Start API
        working-directory: services/api
        run: |
          uvicorn kepler.main:app --host 127.0.0.1 --port 8000 &
          for i in {1..30}; do
            if curl -sf http://localhost:8000/healthz >/dev/null; then break; fi
            sleep 2
          done
      - name: Install Web
        working-directory: apps/web
        run: pnpm install --frozen-lockfile=false
      - name: Build Web
        working-directory: apps/web
        run: pnpm build
      - name: Start Web
        working-directory: apps/web
        run: |
          pnpm start &
          for i in {1..30}; do
            if curl -sf http://localhost:3000/ >/dev/null; then break; fi
            sleep 2
          done
      - name: API integration tests
        working-directory: services/api
        env:
          RUN_INTEGRATION: "1"
        run: pytest tests/integration -v
      - name: Web E2E tests
        working-directory: apps/web
        run: |
          pnpm exec playwright install --with-deps chromium
          pnpm e2e
