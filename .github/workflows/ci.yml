name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-unit:
    name: API unit + smoke tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Tests
        run: python -m pytest tests/unit tests/smoke -v

  api-integration:
    name: API integration tests
    runs-on: ubuntu-latest
    needs: api-unit
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kepler
          POSTGRES_PASSWORD: kepler
          POSTGRES_DB: kepler_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kepler -d kepler_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Tests
        env:
          RUN_INTEGRATION: "1"
        run: python -m pytest tests/integration -v

  web:
    name: Web (typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install deps
        working-directory: .
        run: pnpm install --frozen-lockfile=false
      - name: Typecheck
        working-directory: apps/web
        run: pnpm typecheck
      - name: Tests
        working-directory: apps/web
        run: pnpm test

  ml-unit:
    name: ML unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Tests
        run: python -m pytest tests/unit -v
