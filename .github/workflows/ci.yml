name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # --------------------------------------------------------------------- API
  api-unit:
    name: API unit + smoke tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: services/api/pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Type check
        run: mypy src
        continue-on-error: true
      - name: Unit + smoke tests
        run: pytest tests/unit tests/smoke -v --cov=src/kepler --cov-report=xml --cov-report=term

  api-integration:
    name: API integration tests
    runs-on: ubuntu-latest
    needs: api-unit
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kepler
          POSTGRES_PASSWORD: kepler
          POSTGRES_DB: kepler_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kepler -d kepler_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Integration tests
        env:
          RUN_INTEGRATION: "1"
          TEST_DATABASE_URL: postgresql+asyncpg://kepler:kepler@localhost:5432/kepler_test
          TEST_DATABASE_URL_SYNC: postgresql+psycopg2://kepler:kepler@localhost:5432/kepler_test
          TEST_REDIS_URL: redis://localhost:6379/1
        run: pytest tests/integration -v

  # --------------------------------------------------------------------- WEB
  web:
    name: Web (lint + typecheck + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: apps/web/package.json
      - name: Install root
        run: pnpm install --frozen-lockfile=false
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Unit tests
        run: pnpm test

  # --------------------------------------------------------------------- ML
  ml-unit:
    name: ML unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: services/ml/pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Type check
        run: mypy src
        continue-on-error: true
      - name: Unit tests
        run: pytest tests/unit -v --cov=src/kepler_ml --cov-report=xml --cov-report=term
